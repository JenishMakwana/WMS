name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    name: Backend tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install -r requirements.txt
          pip install aiosqlite pytest-asyncio httpx

      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL: sqlite+aiosqlite:///./test.db
          SECRET_KEY: ci-secret-key
          JWT_SECRET: ci-jwt-secret
          FRONTEND_URL: http://localhost:5173
          SMTP_HOST: localhost
          SMTP_PORT: 1025
          SMTP_USER: ""
          SMTP_PASSWORD: ""
          EMAILS_FROM_EMAIL: test@coreinventory.com
        run: pytest -v --tb=short

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build
        working-directory: frontend
        run: npm run build

  docker-build:
    name: Docker build check
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build --target runtime -t coreinventory-backend ./backend

      - name: Build frontend image
        run: docker build --target runtime -t coreinventory-frontend ./frontend
